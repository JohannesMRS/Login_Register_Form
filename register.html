<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/style.css" />
    <title>Register</title>
  </head>
  <body>
    <div class="register">
      <form action="#" method="POST" class="form-register">
        <h1 class="register-title">Sign Up Here</h1>
        <!-- <label for="username">Username</label> -->
        <input
          type="text"
          name="username"
          class="username"
          placeholder="Username"
          autocomplete="off"
        />
        <input
          type="email"
          name="username"
          class="username"
          placeholder="Email"
          autocomplete="off"
        />
        <!-- <label for="password">Password</label> -->
        <input
          type="password"
          name="password"
          class="password"
          placeholder="Password"
        />
        <input
          type="password"
          name="password"
          class="password"
          placeholder="Confirm Password"
        />
        <button type="submit" class="btn-register">Register</button>
        <p class="check-account">
          Already Have Account? <a href="login.html">Log In Here</a>
        </p>

        <!-- <p class="login-with">Or Login With</p>

        <div class="sosial-media-login">
          <a href="#"><img src="img/google.png" alt="google" /></a>
          <a href="#"><img src="img/facebook.png" alt="facebook" /></a>
          <a href="#"><img src="img/github.png" alt="github" /></a>
        </div> -->
      </form>
    </div>
  </body>
</html>
